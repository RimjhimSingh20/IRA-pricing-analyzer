<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────
const DRUGS = [
  { brand:'Eliquis',       generic:'apixaban',            type:'SM',  years:12, wac:6448,   statCeiling:35, predicted:63, actual:56, tier:'Tier 2', ta:'Cardiology'  },
  { brand:'Jardiance',     generic:'empagliflozin',        type:'SM',  years:10, wac:6111,   statCeiling:25, predicted:63, actual:66, tier:'Tier 1', ta:'Diabetes'     },
  { brand:'Xarelto',       generic:'rivaroxaban',          type:'SM',  years:13, wac:6079,   statCeiling:35, predicted:63, actual:62, tier:'Tier 2', ta:'Cardiology'  },
  { brand:'Januvia',       generic:'sitagliptin',          type:'SM',  years:18, wac:4301,   statCeiling:60, predicted:63, actual:79, tier:'Tier 3', ta:'Diabetes'     },
  { brand:'Farxiga',       generic:'dapagliflozin',        type:'SM',  years:10, wac:5927,   statCeiling:25, predicted:63, actual:68, tier:'Tier 1', ta:'Cardiorenal'  },
  { brand:'Entresto',      generic:'sacubitril/valsartan', type:'SM',  years:9,  wac:7200,   statCeiling:25, predicted:63, actual:53, tier:'Tier 1', ta:'Cardiology'  },
  { brand:'Enbrel',        generic:'etanercept',           type:'Bio', years:26, wac:67897,  statCeiling:60, predicted:60, actual:67, tier:'Tier 3', ta:'Immunology'  },
  { brand:'Imbruvica',     generic:'ibrutinib',            type:'SM',  years:11, wac:181352, statCeiling:25, predicted:63, actual:38, tier:'Tier 1', ta:'Oncology'    },
  { brand:'Stelara',       generic:'ustekinumab',          type:'Bio', years:15, wac:109588, statCeiling:25, predicted:52, actual:66, tier:'Tier 1', ta:'Immunology'  },
  { brand:'NovoLog/Fiasp', generic:'insulin aspart',       type:'Bio', years:24, wac:13100,  statCeiling:60, predicted:60, actual:76, tier:'Tier 3', ta:'Diabetes'     },
];

const errs    = DRUGS.map(d => Math.abs(d.actual - d.predicted));
const RMSE    = Math.sqrt(errs.reduce((s,e) => s+e*e, 0) / errs.length).toFixed(1);
const MAE_VAL = (errs.reduce((s,e) => s+e, 0) / errs.length).toFixed(1);
const W10     = errs.filter(e => e <= 10).length;

function fmtMoney(n) {
  if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`;
  if (n >= 1000)    return `$${(n/1000).toFixed(0)}K`;
  return `$${n}`;
}

function getErrStyle(e) {
  if (e <= 7)  return { color:'#15803d', bg:'#dcfce7' };
  if (e <= 15) return { color:'#b45309', bg:'#fef9c3' };
  return { color:'#b91c1c', bg:'#fee2e2' };
}

// ─── STAT CARD ────────────────────────────────────────────────────────────────
function StatCard({ value, label, sub, accent }) {
  return (
    <div style={{background:'white', borderRadius:12, border:'1px solid #e2e8f0', padding:'22px 24px',
                 boxShadow:'0 1px 4px rgba(0,0,0,0.05)', flex:1, minWidth:180}}>
      <div style={{fontSize:30, fontWeight:800, color:accent, letterSpacing:'-0.02em', lineHeight:1.1}}>{value}</div>
      <div style={{fontSize:14, fontWeight:700, color:'#0f172a', marginTop:8}}>{label}</div>
      <div style={{fontSize:12, color:'#94a3b8', marginTop:3, lineHeight:1.5}}>{sub}</div>
    </div>
  );
}

// ─── COMPARISON TABLE ─────────────────────────────────────────────────────────
function DrugTable() {
  const th = { padding:'10px 14px', fontSize:11, fontWeight:700, color:'#64748b',
               textTransform:'uppercase', letterSpacing:'0.05em', background:'#f8fafc',
               borderBottom:'2px solid #e2e8f0', whiteSpace:'nowrap' };
  const td = { padding:'13px 14px', fontSize:13, color:'#0f172a',
               borderBottom:'1px solid #f1f5f9', verticalAlign:'middle' };

  const avgActual  = Math.round(DRUGS.reduce((s,d) => s+d.actual,    0) / DRUGS.length);
  const avgPred    = Math.round(DRUGS.reduce((s,d) => s+d.predicted, 0) / DRUGS.length);

  return (
    <div style={{overflowX:'auto', borderRadius:12, border:'1px solid #e2e8f0',
                 boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
      <table style={{width:'100%', borderCollapse:'collapse', minWidth:820}}>
        <thead>
          <tr>
            <th style={{...th, textAlign:'left'}}>Drug (Brand)</th>
            <th style={{...th, textAlign:'center'}}>Type</th>
            <th style={{...th, textAlign:'center'}}>Market Age</th>
            <th style={{...th, textAlign:'center'}}>IRA Tier</th>
            <th style={{...th, textAlign:'right'}}>WAC (Annual)</th>
            <th style={{...th, textAlign:'center'}}>Stat. Ceiling</th>
            <th style={{...th, textAlign:'center'}}>Predicted%</th>
            <th style={{...th, textAlign:'center'}}>Actual%</th>
            <th style={{...th, textAlign:'center'}}>Error</th>
          </tr>
        </thead>
        <tbody>
          {DRUGS.map((d, i) => {
            const e    = Math.abs(d.actual - d.predicted);
            const over = d.actual > d.predicted;
            const { color, bg } = getErrStyle(e);
            const predMFP = Math.round(d.wac * (1 - d.predicted / 100));
            const actMFP  = Math.round(d.wac * (1 - d.actual    / 100));
            return (
              <tr key={d.brand} className="tr-hover">
                <td style={{...td, background: i%2===0 ? 'white' : '#fafafa'}}>
                  <div style={{fontWeight:700}}>{d.brand}</div>
                  <div style={{fontSize:11, color:'#94a3b8', fontStyle:'italic', marginTop:1}}>{d.generic}</div>
                </td>
                <td style={{...td, textAlign:'center', background: i%2===0 ? 'white' : '#fafafa'}}>
                  <span style={{display:'inline-flex', alignItems:'center', padding:'2px 9px',
                    borderRadius:999, fontSize:11, fontWeight:600,
                    background: d.type==='SM' ? '#eff6ff' : '#f0fdf4',
                    color:      d.type==='SM' ? '#2563eb' : '#16a34a',
                    border:     `1px solid ${d.type==='SM' ? '#bfdbfe' : '#bbf7d0'}`}}>
                    {d.type==='SM' ? 'Small Mol.' : 'Biologic'}
                  </span>
                </td>
                <td style={{...td, textAlign:'center', color:'#374151', fontWeight:500, background: i%2===0 ? 'white' : '#fafafa'}}>{d.years} yrs</td>
                <td style={{...td, textAlign:'center', color:'#374151', fontWeight:500, background: i%2===0 ? 'white' : '#fafafa'}}>{d.tier}</td>
                <td style={{...td, textAlign:'right', fontFamily:'monospace', fontSize:12, color:'#374151', background: i%2===0 ? 'white' : '#fafafa'}}>{fmtMoney(d.wac)}/yr</td>
                <td style={{...td, textAlign:'center', color:'#64748b', fontWeight:600, background: i%2===0 ? 'white' : '#fafafa'}}>{d.statCeiling}%</td>
                <td style={{...td, textAlign:'center', background: i%2===0 ? 'white' : '#fafafa'}}>
                  <div style={{fontWeight:600, color:'#64748b'}}>{d.predicted}%</div>
                  <div style={{fontSize:11, color:'#cbd5e1', marginTop:1}}>{fmtMoney(predMFP)}/yr</div>
                </td>
                <td style={{...td, textAlign:'center', background: i%2===0 ? 'white' : '#fafafa'}}>
                  <div style={{fontWeight:700, color:'#0f172a'}}>{d.actual}%</div>
                  <div style={{fontSize:11, color:'#cbd5e1', marginTop:1}}>{fmtMoney(actMFP)}/yr</div>
                </td>
                <td style={{...td, textAlign:'center', background: i%2===0 ? 'white' : '#fafafa'}}>
                  <span style={{display:'inline-block', padding:'3px 10px', borderRadius:999,
                                fontSize:12, fontWeight:700, color, background:bg}}>
                    {over ? '↑ +' : '↓ −'}{e}pp
                  </span>
                </td>
              </tr>
            );
          })}
          <tr style={{background:'#f0f7ff', borderTop:'2px solid #bfdbfe'}}>
            <td style={{...td, fontWeight:700, color:'#2563eb', background:'#f0f7ff'}} colSpan={6}>
              Model Statistics (n=10)
            </td>
            <td style={{...td, textAlign:'center', fontWeight:700, color:'#64748b', background:'#f0f7ff'}}>Avg: {avgPred}%</td>
            <td style={{...td, textAlign:'center', fontWeight:700, color:'#0f172a', background:'#f0f7ff'}}>Avg: {avgActual}%</td>
            <td style={{...td, textAlign:'center', background:'#f0f7ff'}}>
              <span style={{fontWeight:700, color:'#d97706', fontSize:12}}>RMSE: {RMSE}pp</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

// ─── BAR CHART ────────────────────────────────────────────────────────────────
function BarChart() {
  const [go, setGo] = useState(false);
  useEffect(() => { const t = setTimeout(() => setGo(true), 350); return () => clearTimeout(t); }, []);

  const sorted = [...DRUGS].sort((a, b) => b.actual - a.actual);
  const MAX = 85;

  return (
    <div>
      <div style={{display:'flex', gap:20, marginBottom:20, flexWrap:'wrap', alignItems:'center'}}>
        <div style={{display:'flex', alignItems:'center', gap:7}}>
          <div style={{width:28, height:11, background:'#94a3b8', borderRadius:3}}/>
          <span style={{fontSize:12.5, color:'#64748b', fontWeight:500}}>Model Predicted (Analyst Base Case)</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:7}}>
          <div style={{width:28, height:11, background:'#2563eb', borderRadius:3}}/>
          <span style={{fontSize:12.5, color:'#64748b', fontWeight:500}}>Actual CMS 2024 Negotiated Price</span>
        </div>
        <div style={{marginLeft:8, padding:'3px 12px', background:'#fffbeb', border:'1px solid #fde68a', borderRadius:999}}>
          <span style={{fontSize:12, fontWeight:600, color:'#d97706'}}>64% — 2024 cycle average</span>
        </div>
      </div>

      <div style={{display:'flex', gap:14, marginBottom:20, flexWrap:'wrap', fontSize:11.5, alignItems:'center'}}>
        <span style={{color:'#94a3b8', fontWeight:600}}>Error magnitude:</span>
        <span style={{background:'#dcfce7', color:'#15803d', padding:'2px 9px', borderRadius:999, fontWeight:600}}>≤7pp — well calibrated</span>
        <span style={{background:'#fef9c3', color:'#b45309', padding:'2px 9px', borderRadius:999, fontWeight:600}}>8–15pp — moderate deviation</span>
        <span style={{background:'#fee2e2', color:'#b91c1c', padding:'2px 9px', borderRadius:999, fontWeight:600}}>≥16pp — outlier</span>
      </div>

      <div style={{borderTop:'1px solid #f1f5f9', paddingTop:20}}>
        {sorted.map(d => {
          const e    = Math.abs(d.actual - d.predicted);
          const over = d.actual > d.predicted;
          const { color, bg } = getErrStyle(e);
          return (
            <div key={d.brand} style={{display:'flex', alignItems:'center', gap:14, marginBottom:18}}>
              <div style={{width:132, flexShrink:0}}>
                <div style={{fontSize:13, fontWeight:700, color:'#0f172a', lineHeight:1.2}}>{d.brand}</div>
                <div style={{fontSize:10.5, color:'#94a3b8', marginTop:1}}>
                  {d.type==='SM' ? 'Small Mol.' : 'Biologic'} · {d.ta}
                </div>
              </div>

              <div style={{flex:1, display:'flex', flexDirection:'column', gap:5}}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div style={{flex:1, height:14, background:'#f1f5f9', borderRadius:4, overflow:'hidden'}}>
                    <div className="bar-fill" style={{height:'100%', borderRadius:4, background:'#94a3b8',
                                                      width: go ? `${(d.predicted/MAX)*100}%` : '0%'}}/>
                  </div>
                  <span style={{fontSize:11, color:'#94a3b8', fontWeight:500, width:34, textAlign:'right', flexShrink:0}}>{d.predicted}%</span>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div style={{flex:1, height:14, background:'#f1f5f9', borderRadius:4, overflow:'hidden'}}>
                    <div className="bar-fill" style={{height:'100%', borderRadius:4, background:'#2563eb',
                                                      width: go ? `${(d.actual/MAX)*100}%` : '0%'}}/>
                  </div>
                  <span style={{fontSize:11, color:'#2563eb', fontWeight:700, width:34, textAlign:'right', flexShrink:0}}>{d.actual}%</span>
                </div>
              </div>

              <div style={{width:64, flexShrink:0, textAlign:'center'}}>
                <span style={{fontSize:11, fontWeight:700, color, background:bg,
                              padding:'3px 8px', borderRadius:999, display:'inline-block'}}>
                  {over ? '+' : '−'}{e}pp
                </span>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{display:'flex', marginLeft:146, marginRight:78, marginTop:4,
                   justifyContent:'space-between', borderTop:'1px dashed #e2e8f0', paddingTop:6}}>
        {['0%','20%','40%','60%','80%'].map(l => (
          <span key={l} style={{fontSize:10, color:'#cbd5e1'}}>{l}</span>
        ))}
      </div>
    </div>
  );
}

// ─── OUTLIER ANALYSIS ─────────────────────────────────────────────────────────
function OutlierSection() {
  const card = { background:'white', borderRadius:12, border:'1px solid #e2e8f0',
                 padding:'24px', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' };

  return (
    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(300px,1fr))', gap:20}}>

      {/* Imbruvica */}
      <div style={card}>
        <div style={{display:'flex', alignItems:'flex-start', gap:14, marginBottom:16}}>
          <div style={{width:42, height:42, background:'#fee2e2', borderRadius:10, flexShrink:0,
                       display:'flex', alignItems:'center', justifyContent:'center'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2.5">
              <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:15, fontWeight:800, color:'#0f172a'}}>Imbruvica (ibrutinib)</div>
            <div style={{display:'flex', gap:8, marginTop:5, alignItems:'center', flexWrap:'wrap'}}>
              <span style={{fontSize:12, fontWeight:600, background:'#fee2e2', color:'#b91c1c', padding:'2px 9px', borderRadius:999}}>Actual 38%</span>
              <span style={{fontSize:11, color:'#94a3b8'}}>vs. predicted 63%</span>
              <span style={{fontSize:12, fontWeight:700, color:'#b91c1c'}}>−25pp largest error</span>
            </div>
          </div>
        </div>
        <div style={{fontSize:13, color:'#374151', lineHeight:1.8}}>
          <p style={{marginBottom:10}}>
            <strong>Largest under-prediction in the cohort.</strong> Imbruvica's below-average discount reflects reduced CMS leverage in a competitive oncology market:
          </p>
          <ul style={{paddingLeft:18, margin:0, display:'flex', flexDirection:'column', gap:6}}>
            <li><strong>BTK inhibitor competition:</strong> Calquence (acalabrutinib) and Brukinsa (zanubrutinib) provide clinical alternatives, limiting CMS's ability to credibly threaten formulary exclusion</li>
            <li><strong>Oncology patient advocacy:</strong> High clinical complexity and patient advocacy intensity constrain CMS willingness to apply maximum pricing pressure</li>
            <li><strong>Manufacturer coalition:</strong> AbbVie/J&J joint commercialization creates a stronger-than-typical negotiation counterparty</li>
            <li><strong>Multi-indication depth:</strong> Deep hematologic malignancy label across CLL, MCL, WM, and MZL justifies premium negotiating stance despite 11-year market age</li>
          </ul>
          <div style={{background:'#fef2f2', border:'1px solid #fecaca', borderRadius:8,
                       padding:'10px 14px', marginTop:14, fontSize:12, color:'#7f1d1d'}}>
            <strong>Model implication:</strong> A competitive-class modifier for oncology drugs with active BTK/category rivals would lower predicted discounts. The uniform 63% SM base overstates CMS leverage in multi-competitor oncology.
          </div>
        </div>
      </div>

      {/* Januvia */}
      <div style={card}>
        <div style={{display:'flex', alignItems:'flex-start', gap:14, marginBottom:16}}>
          <div style={{width:42, height:42, background:'#fef9c3', borderRadius:10, flexShrink:0,
                       display:'flex', alignItems:'center', justifyContent:'center'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2.5">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:15, fontWeight:800, color:'#0f172a'}}>Januvia (sitagliptin)</div>
            <div style={{display:'flex', gap:8, marginTop:5, alignItems:'center', flexWrap:'wrap'}}>
              <span style={{fontSize:12, fontWeight:600, background:'#fef9c3', color:'#92400e', padding:'2px 9px', borderRadius:999}}>Actual 79%</span>
              <span style={{fontSize:11, color:'#94a3b8'}}>vs. predicted 63%</span>
              <span style={{fontSize:12, fontWeight:700, color:'#d97706'}}>+16pp</span>
            </div>
          </div>
        </div>
        <div style={{fontSize:13, color:'#374151', lineHeight:1.8}}>
          <p style={{marginBottom:10}}>
            <strong>Highest negotiated discount in the cohort.</strong> Januvia's 79% discount reflects compounding factors that all pointed toward minimal manufacturer leverage:
          </p>
          <ul style={{paddingLeft:18, margin:0, display:'flex', flexDirection:'column', gap:6}}>
            <li><strong>GLP-1 class disruption:</strong> Ozempic, Mounjaro, and Wegovy have largely displaced DPP-4 inhibitors as the preferred second-line diabetes agent, stripping clinical relevance</li>
            <li><strong>Imminent generic entry:</strong> Sitagliptin generics were anticipated within 12–24 months, removing Merck's long-term exclusivity leverage entirely</li>
            <li><strong>Tier 3 statutory floor:</strong> At 18+ years post-approval, the 60% floor was already high — CMS pushed further given zero rebuttable clinical justification</li>
            <li><strong>Therapeutic replaceability:</strong> Clear evidence-based alternatives eliminate CMS's access-protection obligation, enabling maximum pricing aggression</li>
          </ul>
          <div style={{background:'#fffbeb', border:'1px solid #fde68a', borderRadius:8,
                       padding:'10px 14px', marginTop:14, fontSize:12, color:'#78350f'}}>
            <strong>Model implication:</strong> A "class disruption" modifier should apply when a superior therapeutic mechanism has emerged. When a newer class dominates guidelines, the statutory ceiling discount becomes a floor, not a ceiling.
          </div>
        </div>
      </div>

      {/* Biologic Bias */}
      <div style={card}>
        <div style={{display:'flex', alignItems:'flex-start', gap:14, marginBottom:16}}>
          <div style={{width:42, height:42, background:'#eff6ff', borderRadius:10, flexShrink:0,
                       display:'flex', alignItems:'center', justifyContent:'center'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2.5">
              <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:15, fontWeight:800, color:'#0f172a'}}>Systematic Biologic Underestimation</div>
            <div style={{display:'flex', gap:8, marginTop:5, alignItems:'center', flexWrap:'wrap'}}>
              <span style={{fontSize:12, fontWeight:600, background:'#eff6ff', color:'#1d4ed8', padding:'2px 9px', borderRadius:999}}>Avg actual: 70%</span>
              <span style={{fontSize:11, color:'#94a3b8'}}>vs. avg predicted: 57%</span>
              <span style={{fontSize:12, fontWeight:700, color:'#2563eb'}}>+13pp avg</span>
            </div>
          </div>
        </div>
        <div style={{fontSize:13, color:'#374151', lineHeight:1.8}}>
          <p style={{marginBottom:12}}>
            <strong>All 3 biologics were under-predicted.</strong> The biologic Analyst Base Case of 52% is systematically too conservative — CMS achieved 60–76% on all three:
          </p>
          <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
            {DRUGS.filter(d => d.type==='Bio').map(d => {
              const e = d.actual - d.predicted;
              return (
                <div key={d.brand} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                                           background:'#f8fafc', borderRadius:8, padding:'8px 12px', gap:8}}>
                  <span style={{fontWeight:600, fontSize:13}}>{d.brand}</span>
                  <span style={{fontSize:12, color:'#64748b'}}>
                    Predicted {d.predicted}% → Actual <strong style={{color:'#0f172a'}}>{d.actual}%</strong>
                  </span>
                  <span style={{fontSize:12, fontWeight:700, color:'#2563eb', flexShrink:0}}>+{e}pp</span>
                </div>
              );
            })}
          </div>
          <p style={{marginBottom:10, fontSize:13}}>
            The 52% base case was calibrated to pre-2024 analyst expectations that biologics would receive more deference due to complexity and biosimilar gaps. CMS data invalidates this assumption.
          </p>
          <div style={{background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:8,
                       padding:'10px 14px', fontSize:12, color:'#1e3a8a'}}>
            <strong>Recommendation:</strong> Revise biologic Analyst Base Case from 52% → 62%. This reduces average biologic error from 13pp to approximately 8pp, bringing overall RMSE below 10pp.
          </div>
        </div>
      </div>

    </div>
  );
}

// ─── METHODOLOGY ─────────────────────────────────────────────────────────────
function MethodologySection() {
  return (
    <div style={{background:'white', borderRadius:14, border:'1px solid #e2e8f0',
                 padding:'28px 32px', boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:20}}>
        <div style={{width:36, height:36, background:'#f1f5f9', borderRadius:8,
                     display:'flex', alignItems:'center', justifyContent:'center'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <div>
          <div style={{fontSize:15, fontWeight:700, color:'#0f172a'}}>Methodology & Data Sources</div>
          <div style={{fontSize:12, color:'#94a3b8'}}>Statutory basis, data provenance, and model limitations</div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(240px,1fr))', gap:24, marginBottom:20}}>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:'#0f172a', marginBottom:8,
                       textTransform:'uppercase', letterSpacing:'0.05em'}}>Data Sources</div>
          <ul style={{fontSize:12.5, color:'#64748b', lineHeight:1.85, paddingLeft:18, margin:0}}>
            <li>CMS Medicare Drug Price Negotiation Program — Initial Negotiated Prices for 2026 (August 2024 publication)</li>
            <li>Drug approval dates: FDA Orange Book and Purple Book (CDER/CBER)</li>
            <li>WAC reference prices: approximate 2022–2023 list prices (Micromedex Red Book)</li>
            <li>IRA § 1194(c)(1)(B) — statutory discount tier floors</li>
          </ul>
        </div>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:'#0f172a', marginBottom:8,
                       textTransform:'uppercase', letterSpacing:'0.05em'}}>Model Architecture</div>
          <ul style={{fontSize:12.5, color:'#64748b', lineHeight:1.85, paddingLeft:18, margin:0}}>
            <li>Predicted MFP% = Analyst Base Case from CMS Outcome Simulator</li>
            <li>Small molecule base case: max(statutory tier, 63%) per 2024 SM observed range</li>
            <li>Biologic base case: max(statutory tier, 52%) per pre-2024 analyst consensus</li>
            <li>Discount % applied to WAC as non-FAMP proxy (see limitation below)</li>
          </ul>
        </div>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:'#0f172a', marginBottom:8,
                       textTransform:'uppercase', letterSpacing:'0.05em'}}>Statutory Framework</div>
          <ul style={{fontSize:12.5, color:'#64748b', lineHeight:1.85, paddingLeft:18, margin:0}}>
            <li><strong style={{color:'#0f172a'}}>IRA § 1191–1198</strong> — Medicare drug price negotiation authority</li>
            <li><strong style={{color:'#0f172a'}}>IRA § 1194</strong> — Maximum Fair Price (MFP) calculation methodology</li>
            <li><strong style={{color:'#0f172a'}}>IRA § 1192(d)</strong> — MTEP eligibility thresholds (9yr SM / 13yr Bio)</li>
            <li><strong style={{color:'#0f172a'}}>IRA § 1194(c)(1)(B)</strong> — 25% / 35% / 60% tier discount floors</li>
          </ul>
        </div>
      </div>

      <div style={{background:'#f8fafc', borderRadius:9, border:'1px solid #e2e8f0',
                   padding:'14px 18px', fontSize:12.5, color:'#64748b', lineHeight:1.75}}>
        <strong style={{color:'#0f172a'}}>Important Limitation — WAC vs. Non-FAMP:</strong> This model uses WAC (Wholesale Acquisition Cost) as a proxy for Non-Federal Average Manufacturer Price (non-FAMP), the actual statutory base under IRA § 1194. WAC typically exceeds non-FAMP by 5–15%, meaning real-world MFP dollar values computed here are conservative estimates. Discount percentages (the primary validation metric) are reported relative to WAC for consistency. For authoritative MFP dollar amounts, refer to the CMS published negotiated prices at cms.gov. This tool is intended for analytical planning purposes only and does not constitute regulatory pricing guidance.
      </div>
    </div>
  );
}
